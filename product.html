<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        .sub-hero {
            position: relative;
            padding: 180px 2rem 100px;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(5, 11, 20, 1)), url('assets/hero.png') no-repeat center center/cover;
            background-blend-mode: overlay;
            text-align: center;
        }

        .sub-hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .product-section {
            padding: 4rem 0 6rem;
        }

        /* 검색 및 필터 UI 디자인 */
        .filter-controls-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            margin-bottom: 3rem;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .search-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            flex-grow: 1;
        }

        .search-box input {
            width: 100%;
            background: rgba(5, 11, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 1rem 1.5rem 1rem 3rem;
            border-radius: 50px;
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        .search-box .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .category-row {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-chip:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .filter-chip.active {
            color: #fff;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: transparent;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: var(--secondary-color);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 229, 255, 0.2);
        }

        .product-img-box {
            height: 200px;
            background: linear-gradient(180deg, rgba(10, 25, 50, 0.9) 0%, rgba(5, 11, 20, 0.9) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product-img-box svg {
            width: 90px;
            height: 90px;
            color: var(--secondary-color);
            transition: transform 0.5s ease;
            filter: drop-shadow(0 0 10px rgba(0, 229, 255, 0.3));
        }

        .product-card:hover .product-img-box svg {
            transform: scale(1.1) rotate(5deg);
        }

        .product-info {
            padding: 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .product-category {
            font-size: 0.8rem;
            color: var(--secondary-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0.4rem;
            display: block;
            font-weight: 600;
        }

        .product-name {
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .product-code-badge {
            display: inline-block;
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            margin-bottom: 1.2rem;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.5px;
        }

        .product-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .product-specs {
            list-style: none;
            padding: 0;
            margin-bottom: 1.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1.2rem;
        }

        .product-specs li {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
        }

        .product-specs li::before {
            content: '✓';
            color: var(--secondary-color);
            font-weight: bold;
            margin-right: 8px;
            font-size: 0.85rem;
        }

        .no-results {
            text-align: center;
            padding: 6rem 1rem;
            color: var(--text-muted);
            font-size: 1.15rem;
            grid-column: 1 / -1;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }
    </style>
</head>

                    <div class="no-results">
                        <div style="font-size: 2.5rem; margin-bottom: 1rem;">🔍</div>
                        검색 조건이나 카테고리에 일치하는 펌프 제품이 없습니다.
                    </div>
                `;
                return;
            }

            list.forEach(prod => {
                const card = document.createElement('div');
                card.className = 'product-card';
                
                // SVG 아이콘 참조 설정
                const svgId = `svg-pump-${prod.icon}`;
                
                let specsHtml = '';
                prod.specs.forEach(spec => {
                    specsHtml += `<li>${spec}</li>`;
                });

                card.innerHTML = `
                    <div class="product-img-box">
                        <svg viewBox="0 0 100 100">
                            <use href="#${svgId}"/>
                        </svg>
                    </div>
                    <div class="product-info">
                        <span class="product-category">${prod.categoryKo}</span>
                        <h3 class="product-name">${prod.name}</h3>
                        <span class="product-code-badge">물품분류번호: ${prod.code}</span>
                        <p class="product-desc">${prod.desc}</p>
                        <ul class="product-specs">
                            ${specsHtml}
                        </ul>
                        <a href="inquiry.html?product=${encodeURIComponent(prod.name)}&code=${prod.code}" class="btn-primary" style="text-align:center; width: 100%;">
                            B2B 조달 / 단가 문의
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterProducts() {
            const query = document.getElementById('productSearch').value.trim().toLowerCase();
            
            const filtered = productsData.filter(prod => {
                const matchesSearch = prod.name.toLowerCase().includes(query) || prod.code.includes(query);
                const matchesCategory = selectedCategory === "all" || prod.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            renderProducts(filtered);
        }

        function setCategory(btn) {
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            btn.classList.add('active');
            
            selectedCategory = btn.getAttribute('data-filter');
            filterProducts();
        }

        // 초기화 가동
        renderProducts(productsData);
    </script>
</body>
</html>
