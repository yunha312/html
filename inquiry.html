<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="(주)비에이텍 문의하기 - 제품 구매, 설치 및 수리 상담">
    <title>문의하기 | (주)비에이텍</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .sub-hero {
            position: relative;
            padding: 180px 2rem 100px;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(5, 11, 20, 1)), url('assets/hero.png') no-repeat center center/cover;
            background-blend-mode: overlay;
            text-align: center;
        }

        .sub-hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .inquiry-section {
            padding: 5rem 0;
            display: flex;
            justify-content: center;
        }

        .inquiry-form-container {
            width: 100%;
            max-width: 800px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-label {
            display: block;
            color: #fff;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: rgba(5, 11, 20, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 1rem 1.2rem;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        .form-control:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 150px;
        }

        .submit-btn {
            width: 100%;
            margin-top: 1rem;
            padding: 1.2rem;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <header class="header" id="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">💧</span>
                <span class="logo-text">B·A·Tech</span>
            </a>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="intro.html" class="nav-link">기업소개</a></li>
                    <li><a href="product.html" class="nav-link">주요제품</a></li>
                    <li><a href="equipment.html" class="nav-link">장비</a></li>
                    <li><a href="sales.html" class="nav-link">업력</a></li>
                    <li><a href="campaign.html" class="nav-link">캠페인</a></li>
                    <li><a href="map.html" class="nav-link">찾아오시는 길</a></li>
                    <li><a href="intranet.html" class="nav-link">사내망</a></li>
                    <li><a href="inquiry.html" class="btn-primary nav-btn" style="box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);">문의하기</a></li>
                </ul>
            </nav>
            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="sub-hero">
            <h1 class="sub-hero-title"><span class="highlight">문의</span>하기</h1>
            <p class="sub-hero-desc" style="max-width:600px; margin:0 auto; color:var(--text-muted);">
                펌프 구매, 설치, 수리 및 기술 지원에 대해 궁금한 점을 남겨주시면 신속하게 답변해 드립니다.
            </p>
        </section>

        <section class="inquiry-section">
            <div class="container" style="display:flex; justify-content:center; width:100%;">
                <div class="inquiry-form-container">
                    <form action="#" method="POST" onsubmit="event.preventDefault(); alert('성공적으로 접수되었습니다. 담당자가 곧 연락드리겠습니다.');">
                        <div class="form-group">
                            <label for="name" class="form-label">이름 / 회사명 <span style="color:var(--secondary-color);">*</span></label>
                            <input type="text" id="name" class="form-control" placeholder="홍길동 / (주)OO기업" required>
                        </div>
                        <div class="form-group">
                            <label for="contact" class="form-label">연락처 <span style="color:var(--secondary-color);">*</span></label>
                            <input type="tel" id="contact" class="form-control" placeholder="010-0000-0000" required>
                        </div>
                        <div class="form-group">
                            <label for="email" class="form-label">이메일</label>
                            <input type="email" id="email" class="form-control" placeholder="example@domain.com">
                        </div>
                        <div class="form-group">
                            <label for="category" class="form-label">문의 유형</label>
                            <select id="category" class="form-control">
                                <option value="product">제품 구매 상담</option>
                                <option value="install">설치 및 시공 문의</option>
                                <option value="repair">A/S 및 수리 접수</option>
                                <option value="other">기타 문의</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="message" class="form-label">문의 내용 <span style="color:var(--secondary-color);">*</span></label>
                            <textarea id="message" class="form-control" placeholder="상세한 문의 내용을 입력해 주세요." required></textarea>
                        </div>
                        <button type="submit" class="btn-primary submit-btn">문의 접수하기</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-info">
                <div class="footer-logo">💧 B·A·Tech</div>
                <p class="footer-desc">깨끗한 물의 가치를 소중히 여기는 기업, (주)비에이텍입니다.</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 (주)비에이텍 All Rights Reserved.</p>
        </div>
    </footer>
</body>
</html>
